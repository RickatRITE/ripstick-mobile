name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch shared modules from parent repo
        uses: actions/checkout@v4
        with:
          repository: RickatRITE/RipStick
          token: ${{ secrets.PARENT_REPO_TOKEN }}
          sparse-checkout: shared
          path: _parent
      - run: cp -r _parent/shared "$GITHUB_WORKSPACE/../shared" && rm -rf _parent

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
